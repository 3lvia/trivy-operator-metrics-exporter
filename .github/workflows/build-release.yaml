name: Build and release

on:
  push:
    branches: [trunk]
    paths-ignore:
      - 'README.md'
      - 'manifests/**'
  pull_request:
    branches: [trunk]
    paths-ignore:
      - 'README.md'
      - 'manifests/**'
  schedule:
    - cron: '1 3 * * 5' # Every Friday at 03:01 UTC

env:
  IMAGE_NAME: 'ghcr.io/${{ github.repository }}'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: write
    env:
      TRIVY_SARIF: 'trivy-results.sarif'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get version
        run: echo "VERSION=v$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: 'ghcr.io'
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image with cache and push to registry
        uses: docker/build-push-action@v7
        with:
          push: 'true'
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ (github.event_name == 'push' && github.ref == 'refs/heads/trunk') && format('{0}:latest', env.IMAGE_NAME) || '' }}
          cache-from: 'type=registry,ref=${{ env.IMAGE_NAME }}:latest'
          cache-to: 'type=inline'

      #     - name: Scan image with Trivy
      #       uses: aquasecurity/trivy-action@0.35.0
      #       with:
      #         image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
      #         format: 'sarif'
      #         exit-code: '0'
      #         output: ${{ env.TRIVY_SARIF }}
      #         version: 'latest'
      #       env:
      #         TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
      #         TRIVY_JAVA_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-java-db:1'

  #     - name: Upload Trivy scan results
  #       uses: github/codeql-action/upload-sarif@v4
  #       with:
  #         sarif_file: ${{ env.TRIVY_SARIF }}
  #         category: 'Trivy'

  pre-release:
    name: Pre-release
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    outputs:
      version-tag: ${{ steps.get-version.outputs.version_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: get-version
        run: |
          version=$(cat VERSION)
          echo "VERSION_TAG=v$version" | tee -a "$GITHUB_ENV" "$GITHUB_OUTPUT"

      - name: Check if new version has been (pre-)released
        id: check-release
        run: |
          latest_version=$(gh release list --json name,isLatest -q '.[] | select(.isLatest == true) | .name')
          if [[ "$latest_version" == "$VERSION_TAG" ]]; then
            echo "Version already released."
            echo 'already-release=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_prerelease_version=$(gh release list --json name,isPrerelease -q 'first(.[] | select(.isPrerelease == true) | .name)')
          if [[ "$latest_prerelease_version" == "$VERSION_TAG" ]]; then
            echo "Pre-release already created."
            echo 'already-release=true' >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create pre-release if new version
        if: ${{ steps.check-release.outputs.already-release != 'true' }}
        run: |
          gh release create \
            "$VERSION_TAG" \
            --prerelease \
            --latest \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  build-release-chart:
    name: Build and release Helm chart
    runs-on: ubuntu-latest
    env:
      CHART_URL: 'oci://ghcr.io/${{ github.repository_owner }}/charts'
      CHART_NAME: 'trivy-operator-metrics-exporter'
    permissions:
      contents: read
      packages: write
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check if chart already exists
        id: check-chart
        run: |
          VERSION=$(cat VERSION)

          if helm show chart \
            "$CHART_URL/$CHART_NAME" \
            --version "$VERSION" > /dev/null 2>&1; then
            echo "Chart version already exists. Skipping chart release."
            echo 'already-released=true' >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Login to GHCR
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: echo "$REGISTRY_PASSWORD" | helm registry login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY: 'ghcr.io'
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: helm package "charts/$CHART_NAME"

      - name: Push chart
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: helm push $CHART_NAME-*.tgz "$CHART_URL"

  tag-image:
    name: Tag image
    needs: [pre-release]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    env:
      VERSION_TAG: ${{ needs.pre-release.outputs.version-tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: 'ghcr.io'
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with version and push
        run: |
          docker pull "$IMAGE_NAME:$GITHUB_SHA"
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:$VERSION_TAG"
          docker push "$IMAGE_NAME:$VERSION_TAG"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [pre-release, tag-image]
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Release if new version and not alpha or beta
        if: ${{ !contains(needs.build.outputs.version-tag, '-alpha') && !contains(needs.build.outputs.version-tag, '-beta') }}
        run: gh release edit "$VERSION_TAG" --prerelease=false --latest=true
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.pre-release.outputs.version-tag }}
