{{- if .Values.networkPolicy.enabled }}
{{- if eq (.Values.networkPolicy.type | default "k8s") "k8s" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "trivy-operator-metrics-exporter.name" . }}

  ingress:
    # Allow traffic to /metrics and /status endpoints
    - ports:
        - port: 8080
          protocol: TCP

  egress:
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
{{- if .Values.logs.otel.enabled }}

    # OpenTelemetry logs
    - ports:
        - port: {{ with .Values.logs.otel.endpoint | urlParse }}{{ splitList ":" .host | last }}{{ end }}
          protocol: TCP
{{- end }}
{{- end }}
{{- if eq (.Values.networkPolicy.type | default "k8s") "cilium" }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "trivy-operator-metrics-exporter.name" . }}

  ingress:
    # Allow traffic to /metrics and /status endpoints
    - toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /metrics
              - method: GET
                path: /status

  egress:
    # Kubernetes API server
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP

{{- if .Values.logs.otel.enabled }}
    # OpenTelemetry logs
    - toPorts:
        - ports:
            - port: '{{ with .Values.logs.otel.endpoint | urlParse }}{{ splitList ":" .host | last }}{{ end }}'
              protocol: TCP
{{- end }}
{{- end }}
{{- end }}
