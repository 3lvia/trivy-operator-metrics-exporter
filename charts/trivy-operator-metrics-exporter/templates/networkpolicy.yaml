{{- if .Values.networkPolicy.enabled }}
{{- if eq (.Values.networkPolicy.type | default "k8s") "k8s" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "trivy-operator-metrics-exporter.name" . }}

  ingress:
    - ports:
        - protocol: TCP
          port: 8080

  egress:
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
{{- if eq (.Values.networkPolicy.type | default "k8s") "cilium" }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "trivy-operator-metrics-exporter.name" . }}

  ingress:
    - toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
          rules:
            http:
              - method: GET
                path: /metrics

  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP

{{- end }}
{{- end }}
