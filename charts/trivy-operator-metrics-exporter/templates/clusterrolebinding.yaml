apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "trivy-operator-metrics-exporter.name" . }}
    namespace: {{ .Release.Namespace }}
