apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trivy-operator-metrics-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "trivy-operator-metrics-exporter.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "trivy-operator-metrics-exporter.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trivy-operator-metrics-exporter.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "trivy-operator-metrics-exporter.name" . }}
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsUser: 65534
        supplementalGroups:
          - 65534
      {{- if .Values.muteConfig }}
      volumes:
        - name: mute-config
          configMap:
            name: {{ include "trivy-operator-metrics-exporter.name" . }}-mute-config
      {{- end }}
      containers:
        - name: trivy-operator-metrics-exporter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GIN_MODE
              value: "release"
            - name: ENABLE_VULNERABILITY_METRICS
              value: {{ if (eq (.Values.metrics.vulnerabilities.enabled | toString) "true") }}"true"{{ else }}"false"{{ end }}
            - name: ENABLE_CONFIG_AUDIT_METRICS
              value: {{ if (eq (.Values.metrics.configAudits.enabled | toString) "true") }}"true"{{ else }}"false"{{ end }}
            - name: ENABLE_EXPOSED_SECRET_METRICS
              value: {{ if (eq (.Values.metrics.exposedSecrets.enabled | toString) "true") }}"true"{{ else }}"false"{{ end }}
          {{- if .Values.logs.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.logs.otel.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.logs.otel.protocol | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ printf "service.name=%s" (include "trivy-operator-metrics-exporter.name" .) | quote }}
          {{- end }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.muteConfig }}
          volumeMounts:
            - name: mute-config
              mountPath: /mute.yaml
              subPath: mute.yaml
              readOnly: true
          {{- end }}
