image:
  repository: ghcr.io/3lvia/trivy-operator-metrics-exporter
  tag: v0.7.0
  pullPolicy: Always

serviceMonitor:
  enabled: true
#
# labels: {}
#
# annotations: {}

metrics:
  vulnerabilities:
    enabled: true

  configAudits:
    enabled: true

  exposedSecrets:
    enabled: true

logs:
  otel:
    enabled: false

    endpoint: http://opentelemetry-collector.monitoring.svc.cluster.local:4317
    protocol: grpc

networkPolicy:
  enabled: false

  # k8s or cilium
  type: k8s
#
# resources:
#   limits:
#     cpu: 100m
#     memory: 128Mi
#   requests:
#     cpu: 50m
#     memory: 64Mi
#
# extraEnv: []
#
# muteConfig: |
#   vulnerabilities:
#     # Mutes all vulnerabilities with CVE-2025-15467, regardless of the namespace or image.
#     - id: CVE-2025-15467

#     # Mutes all vulnerabilities with CVE-2025-15467 in the "traefik" namespace, regardless of the image.
#     - id: CVE-2025-15467
#       namespace: traefik

#     # Mutes all vulnerabilities with CVE-2025-15467 in any namespace, but only for the "curlimages/curl" image.
#     - id: CVE-2025-15467
#       namespace: traefik
#       imageName: curlimages/curl
