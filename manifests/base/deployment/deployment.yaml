apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-operator-metrics-exporter
  namespace: trivy-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator-metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy-operator-metrics-exporter
    spec:
      containers:
        - image: ghcr.io/3lvia/trivy-operator-metrics-exporter:latest
          imagePullPolicy: Always
          env:
            - name: GIN_MODE
              value: release
            - name: ENVIRONMENT
              value: production
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          name: trivy-operator-metrics-exporter
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      serviceAccountName: trivy-operator-metrics-exporter
      securityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsUser: 1001
        supplementalGroups:
          - 1001
